version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: bitmind
      POSTGRES_PASSWORD: bitmind
      POSTGRES_DB: bitmind
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  bitmind-api:
    build: .
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://bitmind:bitmind@db:5432/bitmind
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  pgdata:
