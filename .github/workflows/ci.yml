name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Install ruff
        run: |
          pip install ruff

      - name: Generate Ruff JSON report
        run: |
          ruff check . --output-format json > ruff-report.json || true
          test -s ruff-report.json || echo '[]' > ruff-report.json

      - name: Upload Ruff report
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report-${{ matrix.python-version }}
          path: ruff-report.json

      - name: Lint critical errors only
        run: |
          ruff check . --select E9,F63,F7,F82

      - name: Run tests with coverage
        run: |
          pytest --cov=bitmind --cov-report=term-missing -q
