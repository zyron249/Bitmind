name: Ruff report (manual)

on:
  workflow_dispatch:

jobs:
  ruff-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff JSON report
        run: |
          ruff check . --format json > ruff-report.json || true
          test -s ruff-report.json || echo '[]' > ruff-report.json

      - name: Upload ruff-report.json
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report
          path: ruff-report.json
